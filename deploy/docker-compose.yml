services:
  web:
    build:
      context: ..
      dockerfile: docker/prod/Dockerfile
      target: slim
    image: ${COMPOSE_PROJECT_NAME:-openproject_custom}/web:local
    restart: unless-stopped
    depends_on:
      - db
      - cache
    ports:
      - "8080:8080"
    environment: &openproject_env
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "1"
      SECRET_KEY_BASE: ${OPENPROJECT_SECRET_KEY_BASE}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      OPENPROJECT_HOST__NAME: ${OPENPROJECT_HOST}
      OPENPROJECT_HTTPS: ${OPENPROJECT_HTTPS}
      OPENPROJECT_EDITION: ${OPENPROJECT_EDITION:-standard}
      OPENPROJECT_RAILS__CACHE__STORE: memcache
      OPENPROJECT_CACHE__MEMCACHE__SERVER: ${MEMCACHE_SERVERS:-cache:11211}
      OPENPROJECT_ATTACHMENTS__STORAGE__PATH: /var/openproject/assets/files
      OPENPROJECT_EMAIL__DELIVERY__METHOD: ${OPENPROJECT_EMAIL__DELIVERY__METHOD:-test}
      OPENPROJECT_SMTP__ADDRESS: ${OPENPROJECT_SMTP__ADDRESS:-}
      OPENPROJECT_SMTP__PORT: ${OPENPROJECT_SMTP__PORT:-587}
      OPENPROJECT_SMTP__DOMAIN: ${OPENPROJECT_SMTP__DOMAIN:-}
      OPENPROJECT_SMTP__USER__NAME: ${OPENPROJECT_SMTP__USER__NAME:-}
      OPENPROJECT_SMTP__PASSWORD: ${OPENPROJECT_SMTP__PASSWORD:-}
      OPENPROJECT_SMTP__AUTHENTICATION: ${OPENPROJECT_SMTP__AUTHENTICATION:-plain}
      OPENPROJECT_SMTP__ENABLE__STARTTLS__AUTO: ${OPENPROJECT_SMTP__ENABLE__STARTTLS__AUTO:-true}
      OPENPROJECT_WEB_WORKERS: ${OPENPROJECT_WEB_WORKERS:-2}
      OPENPROJECT_WEB_MAX__THREADS: ${OPENPROJECT_WEB_MAX_THREADS:-8}
      OPENPROJECT_WEB_MIN__THREADS: ${OPENPROJECT_WEB_MIN_THREADS:-4}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://openrouter.ai/api/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-google/gemini-2.5-flash-lite}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-google/gemini-2.5-flash-image}
      LIGHTRAG_URL: ${LIGHTRAG_URL:-}
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY:-}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-}
      MCP_SERVER_USERNAME: ${MCP_SERVER_USERNAME:-}
      MCP_SERVER_PASSWORD: ${MCP_SERVER_PASSWORD:-}
      OPENPROJECT_IA_PROMPT_PASSWORD: ${OPENPROJECT_IA_PROMPT_PASSWORD:-}
      MIGRATE: "true"
    volumes:
      - opdata:/var/openproject/assets

  worker:
    image: ${COMPOSE_PROJECT_NAME:-openproject_custom}/web:local
    restart: unless-stopped
    depends_on:
      - web
      - db
      - cache
    command: ./docker/prod/worker
    environment:
      <<: *openproject_env
      MIGRATE: "false"
    volumes:
      - opdata:/var/openproject/assets

  db:
    image: postgres:13
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  cache:
    image: memcached:1.6
    restart: unless-stopped

volumes:
  pgdata:
  opdata:
